<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leave Us a Review ❤️</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f7f7f7;
padding:20px;
text-align:center;
}

h2{
color:#004ea2;
}

.review-box{
background:#d5eaf7;
padding:18px;
margin:15px auto;
border-radius:12px;
max-width:600px;
text-align:left;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.title{
font-weight:bold;
margin-bottom:5px;
}

.stars{
color:#f5b301;
margin-bottom:8px;
}

.copy-btn{
background:#004ea2;
color:white;
border:none;
padding:8px 14px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.copy-btn:hover{
opacity:0.9;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#004ea2;
color:white;
padding:12px 20px;
border-radius:10px;
display:none;
font-weight:bold;
}

</style>
</head>

<body>

<h2>
Choose a template → Copy → Paste to Google Review ⭐
<br>❤ Thank you so much for supporting us! ❤
</h2>

<div id="reviews"></div>

<div id="toast" class="toast">
已复制内容！<br>
请前往 Google Review 粘贴 👍
</div>

<script>

const reviewLink="YOUR_GOOGLE_REVIEW_LINK";

/* ===== 20 REVIEWS ===== */

const reviews=[

{title:"〖特地从新加坡过来配眼镜〗",text:"特地从新加坡过来配眼镜，一开始其实有点担心，但验光真的很专业，会解释得很清楚，不是那种随便配。戴了一个星期，真的很舒服，完全没有不适。值得特地过来。"},
{title:"〖Worth the Trip from Singapore〗",text:"Came all the way from Singapore to make my glasses. Honestly was a bit worried at first, but the eye test was very thorough and well explained. Been wearing for a week now, super comfortable. Definitely worth the trip."},

{title:"〖不只是卖眼镜〗",text:"这里不是那种只卖眼镜的店，更像是帮你解决视力问题。验光师很细心，会根据生活习惯建议镜片，感觉很专业。"},
{title:"〖More Than Just Glasses〗",text:"This is not just a place selling glasses, they actually help you solve your vision issues. The optometrist was very detailed and gave recommendations based on my lifestyle. Very professional."},

{title:"〖体验比新加坡更好〗",text:"在新加坡配过几次眼镜，但这次体验反而更好。这里会慢慢帮你调到最适合，不会赶时间。"},
{title:"〖Better Experience Than Expected〗",text:"I’ve made glasses in Singapore before, but this experience was actually better. They take their time to fine-tune everything, not rushed at all."},

{title:"〖小孩验光很安心〗",text:"带孩子来配近视控制镜片，讲解非常清楚，也不会乱推荐。作为家长会比较安心。"},
{title:"〖Very Assuring for Parents〗",text:"Brought my child here for myopia control lenses. Everything was explained clearly and no hard selling. As a parent, I feel very assured."},

{title:"〖朋友介绍，超出预期〗",text:"朋友介绍来的，本来只是想试试看，结果比预期好很多。服务很细，但不会让人有压力。"},
{title:"〖Better Than Expected〗",text:"Came here through a friend’s recommendation. Didn’t expect much at first, but it turned out really good. Service is detailed but not pushy."},

{title:"〖夜驾真的改善〗",text:"夜驾镜片真的有差，晚上开车不刺眼。之前一直以为是正常的，现在才知道原来可以改善。"},
{title:"〖Night Driving Improved〗",text:"The night driving lenses really make a difference. Driving at night is much more comfortable now. Didn’t realise this could be improved before."},

{title:"〖过程专业有耐心〗",text:"整个过程很有耐心，从验光到选镜框都有人指导，不会乱买。感觉每一步都很专业。"},
{title:"〖Guided & Professional〗",text:"Very patient throughout the whole process, from eye test to choosing frames. No random selling, everything feels guided and professional."},

{title:"〖品质值得价格〗",text:"价格不是最便宜的，但你会知道自己在付什么。品质和服务都有到位。"},
{title:"〖Worth the Price〗",text:"Not the cheapest, but you understand what you are paying for. Quality and service are definitely there."},

{title:"〖跨境也放心〗",text:"跨境来配眼镜，最怕售后问题，但这里会交代清楚，也有跟进，让人放心。"},
{title:"〖Peace of Mind〗",text:"Coming from Singapore, my biggest concern was after-sales. But they explained everything clearly and followed up, which gives peace of mind."},

{title:"〖长期照顾眼睛〗",text:"不是那种一次性服务，之后也会提醒复查。感觉是长期照顾眼睛的地方。"},
{title:"〖Long-Term Eye Care〗",text:"It’s not a one-time service. They follow up and remind for check-ups. Feels like a place for long-term eye care."}

];

/* ===== RANDOM + SHOW ONLY 6 ===== */

const shuffled = reviews.sort(()=>Math.random()-0.5);
const selected = shuffled.slice(0,6);

const container=document.getElementById("reviews");

selected.forEach(r=>{

const box=document.createElement("div");
box.className="review-box";

box.innerHTML=`
<div class="title">${r.title}</div>
<div class="stars">⭐⭐⭐⭐⭐</div>
<div>${r.text}</div>
<button class="copy-btn">COPY</button>
`;

box.querySelector("button").onclick=()=>{

navigator.clipboard.writeText(r.text);

const toast=document.getElementById("toast");
toast.style.display="block";

setTimeout(()=>{
toast.style.display="none";
window.open(reviewLink,"_blank");
},900);

};

container.appendChild(box);

});

</script>

</body>
</html>
