<!DOCTYPE html>

<title>Review Page</title>

<style>
body{

  background:#f0f4f8;
  padding:20px;
}

.review-box{
  background:#d5eaf7;
  padding:15px;
  margin:12px 0;
  border-radius:10px;
  position:relative;
}

.copy-btn{
  position:absolute;
  top:15px;
  right:15px;
  background:#004ea2;
  color:white;
  font-weight:bold;
  border:none;
  padding:7px 14px;
  border-radius:6px;
  cursor:pointer;
}

.copy-btn:hover{
  opacity:0.9;
}

.title{
  font-weight:bold;
  font-size:18px;
  margin-bottom:6px;
}

.star{
  color:#ffb400;
  margin-bottom:10px;
  font-size:18px;
}

.text{
  line-height:1.6;
}

.copy-msg{
  color:green;
  font-size:14px;
  margin-top:8px;
  display:none;
}
</style>
</head>

Choose a template → Copy & Paste → Post Your Google Review

❤ Thank you so much for being with us — we truly appreciate your support ❤

function getRandomReviews(arr,count){
  return arr
    .slice()
    .sort(()=>0.5-Math.random())
    .slice(0,count);
}

function renderReviews(){

  const container = document.getElementById("reviews-container");
  container.innerHTML = "";

  const selected = getRandomReviews(reviews,8);

  selected.forEach(rev=>{

    const div = document.createElement("div");

    div.className = "review-box";

    div.innerHTML = `
      <div class="title">${rev.title}</div>
      <div class="star">⭐️⭐️⭐️⭐️⭐️</div>
      <div class="text">${rev.text}</div>

      <button class="copy-btn">Copy</button>

      <div class="copy-msg">
      Copied successfully! Redirecting to Google Review...
      </div>
    `;

    container.appendChild(div);

    const copyBtn = div.querySelector(".copy-btn");
    const copyMsg = div.querySelector(".copy-msg");

    copyBtn.addEventListener("click",()=>{

      navigator.clipboard.writeText(rev.text).then(()=>{

        copyMsg.style.display="block";

        setTimeout(()=>{
          copyMsg.style.display="none";
        },2000);

        window.open(googleReviewURL,"_blank");

      });

    });

  });

}

renderReviews();

</script>

</body>
