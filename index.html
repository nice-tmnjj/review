<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nice Vision Reviews</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
    max-width:700px;
    margin:auto;
}
h2{
    text-align:center;
    margin-bottom:20px;
}
.review-box{
    background:#d5eaf7;
    border-radius:10px;
    padding:15px;
    margin-bottom:18px;
}
.review-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.review-title{
    font-weight:bold;
    font-size:16px;
}
.stars{
    margin:6px 0;
}
.copy-btn{
    background:#004ea2;
    color:white;
    border:none;
    padding:6px 14px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}
.toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:green;
    color:white;
    padding:12px 18px;
    border-radius:10px;
    font-weight:bold;
    display:none;
    z-index:9999;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<h2>Choose a template → Copy & Paste → Post Your Google Review 
<br>❤ Thank you so much for being with us—we really appreciate you! ❤</h2>

<div id="reviews"></div>

<div id="toast" class="toast">
已复制内容！<br>
请前往 Google Review 粘贴 👍
</div>

<script>
// ⭐ Google Review 链接
var reviewLink = "https://g.page/r/CWQ6oS4buVX2EAE/review";

// ⭐ Review 数据（60 条中英文混合示例）
var reviews = [
  {title:"1️⃣ 终于适应款", text:"之前试过几次渐进镜都不习惯，这次在这里配终于成功了，看远看近都很舒服 👍"},
  {title:"1️⃣ Finally Adapted", text:"I tried progressive lenses before but couldn’t adapt. This time finally works well, vision is comfortable for both far and near 👍"},
  {title:"2️⃣ 不头晕款", text:"以前戴渐进镜会头晕，这副完全不会，走路也很自然，很满意"},
  {title:"2️⃣ No Dizziness", text:"I used to feel dizzy with progressive lenses, but this pair feels natural even when walking. Very satisfied"},
  // ... 在这里继续把你 60 条 review 填进去
];

// ⭐ 随机抽取 8 条显示
function getRandomReviews(arr, count){
    let shuffled = arr.slice(0);
    for(let i = shuffled.length -1; i > 0; i--){
        let j = Math.floor(Math.random() * (i+1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled.slice(0,count);
}

var container = document.getElementById("reviews");
var selectedReviews = getRandomReviews(reviews,8);

selectedReviews.forEach(function(r){
    var box = document.createElement("div");
    box.className = "review-box";

    box.innerHTML = 
        '<div class="review-header">'+
            '<div class="review-title">'+r.title+'</div>'+
            '<button class="copy-btn">Copy</button>'+
        '</div>'+
        '<div class="stars">⭐⭐⭐⭐⭐</div>'+
        '<div>'+r.text+'</div>';

    var btn = box.querySelector(".copy-btn");
    btn.onclick = function(){
        // 复制内容
        var temp = document.createElement("textarea");
        temp.value = r.text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);

        // 显示浮动提示
        var toast = document.getElementById("toast");
        toast.style.display="block";
        setTimeout(function(){
            toast.style.display="none";
        },2000);

        // 跳转 Google Review
        setTimeout(function(){
            window.location.href = reviewLink;
        }, 500);
    };

    container.appendChild(box);
});
</script>

</body>
</html>
