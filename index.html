function getRandomReviews(arr,count){return arr.slice().sort(()=>0.5-Math.random()).slice(0,count);}
function renderReviews(){
const container=document.getElementById("reviews-container");
container.innerHTML="";
const selected=getRandomReviews(reviews,8);
selected.forEach(rev=>{
const div=document.createElement("div");
div.className="review-box";
div.innerHTML=`<div class="title">${rev.title}</div><div class="star">⭐️⭐️⭐️⭐️⭐️</div><div class="text">${rev.text}</div><button class="copy-btn">Copy</button><div class="copy-msg">已复制内容！<br>请前往 Google Review 粘贴 👍</div>`;
container.appendChild(div);
const copyBtn=div.querySelector(".copy-btn");
const copyMsg=div.querySelector(".copy-msg");
copyBtn.addEventListener("click",()=>{navigator.clipboard.writeText(rev.text).then(()=>{copyMsg.style.display="block";setTimeout(()=>{copyMsg.style.display="none";},3000);window.open(googleReviewURL,"_blank");});});
});}
renderReviews();
