// Function to get 8 random reviews
function getRandomReviews(arr, count) {
    let shuffled = arr.sort(() => 0.5 - Math.random());
    return shuffled.slice(0, count);
}

function renderReviews() {
    const container = document.getElementById('reviews-container');
    const selected = getRandomReviews(reviews, 8);

    container.innerHTML = '';
    selected.forEach((rev) => {
        const div = document.createElement('div');
        div.className = 'review-box';
        div.innerHTML = `
            <span class="review-title">${rev.title}</span>
            <button class="copy-btn" onclick="copyAndGo('${encodeURIComponent(rev.text)}')">Copy</button>
            <p>${rev.text}</p>
            <p class="copy-msg" style="display:none;"></p>
        `;
        container.appendChild(div);
    });
}

function copyAndGo(text) {
    navigator.clipboard.writeText(decodeURIComponent(text)).then(() => {
        window.location.href = reviewLink;
    });
}

// Render on load
renderReviews();
